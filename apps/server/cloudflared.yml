# Cloudflare Tunnel configuration for DEJA.js Server
# ===================================================
#
# This config is used with `cloudflared tunnel run` for persistent named tunnels.
# For quick/ad-hoc tunnels (no account required), use `pnpm tunnel` instead.
#
# Setup instructions:
#   1. Install cloudflared (see README.md)
#   2. Authenticate: cloudflared tunnel login
#   3. Create a tunnel: cloudflared tunnel create deja-js
#   4. Copy the tunnel ID into the "tunnel" field below
#   5. Create a DNS record: cloudflared tunnel route dns deja-js your-sub.yourdomain.com
#   6. Run: pnpm tunnel:named
#
# Docs: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/

# The tunnel UUID -- replace with your own after running `cloudflared tunnel create`
tunnel: 5b988b14-b0b5-4979-a98a-1059b6c2f1aa

# Path to the credentials file generated by `cloudflared tunnel create`
# Default location varies by OS:
#   macOS/Linux: ~/.cloudflared/<tunnel-uuid>.json
#   Windows: %USERPROFILE%\.cloudflared\<tunnel-uuid>.json
credentials-file: /home/user/.cloudflared/YOUR_TUNNEL_UUID_HERE.json

ingress:
  # Route all traffic to the local DEJA.js WebSocket server
  - service: http://localhost:8082
    originRequest:
      # Skip TLS verification for local connections (server runs plain HTTP/WS)
      noTLSVerify: true
      # cloudflared supports WebSocket natively when connecting to HTTP origins
      connectTimeout: 30s
      # Keep idle connections alive longer to avoid reconnects during quiet periods
      keepAliveTimeout: 90s

  # Catch-all rule (required by cloudflared) -- returns 404 for unmatched routes
  - service: http_status:404
