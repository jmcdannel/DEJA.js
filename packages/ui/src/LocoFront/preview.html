<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locomotive Front Gallery — DEJA.js</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(30,100,180,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 30%, rgba(200,60,40,0.06) 0%, transparent 50%);
      font-family: 'Inter', system-ui, sans-serif;
      color: #e8e8f0;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 1.5rem;
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 40%, #fb7185 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 0.5rem;
      color: rgba(255,255,255,0.45);
      font-size: 0.95rem;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      padding: 2rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem 1.25rem 1.25rem;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.07);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      cursor: default;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
      border-color: rgba(255,255,255,0.15);
    }

    .card .label {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      text-align: center;
    }

    .card .sublabel {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      font-weight: 400;
    }
  </style>
</head>
<body>
  <header>
    <h1>🚂 Locomotive Front Gallery</h1>
    <p>Pure SVG front-view illustrations — one for each popular roadname</p>
  </header>
  <div class="gallery" id="gallery"></div>

  <script>
    /*
     * Logo paths — relative from this file to the throttle app's assets.
     * Because this is a file:// preview, we use ../../../../ to reach
     * apps/throttle/src/assets/logos/
     */
    const LOGO_BASE = '../../../../apps/throttle/src/assets/logos/';

    const DESIGNS = {
      bnsf: {
        bodyColor: '#E87511', frameColor: '#1a1a1a',
        accentColor: '#FFD100', accent2Color: '#000000',
        glassTint: 'rgba(40,60,80,0.75)',
        numberBoardBg: '#111', numberBoardText: '#fff',
        noseText: 'BNSF', noseTextColor: '#000',
        handrailColor: '#f5f5f5',
        headlightHousing: '#ccc', ditchLightColor: '#e2e2e2',
        label: 'BNSF Railway', number: '7132',
        logo: LOGO_BASE + 'bnsf.png',
      },
      up: {
        bodyColor: '#FFB81C', frameColor: '#3d3d3d',
        accentColor: '#c8102e', accent2Color: '#1e3a6d',
        glassTint: 'rgba(30,50,70,0.78)',
        numberBoardBg: '#111', numberBoardText: '#fff',
        noseText: 'UP', noseTextColor: '#1e3a6d',
        handrailColor: '#f0f0f0',
        headlightHousing: '#bbb', ditchLightColor: '#ddd',
        label: 'Union Pacific', number: '6899',
        logo: LOGO_BASE + 'up.svg',
      },
      csx: {
        bodyColor: '#003087', frameColor: '#1e1e1e',
        accentColor: '#FFD100',
        glassTint: 'rgba(20,30,55,0.82)',
        numberBoardBg: '#000', numberBoardText: '#fff',
        noseText: 'CSX', noseTextColor: '#fff',
        handrailColor: '#eee',
        headlightHousing: '#999', ditchLightColor: '#ccc',
        label: 'CSX Transportation', number: '3194',
        logo: LOGO_BASE + 'csx.svg',
      },
      ns: {
        bodyColor: '#1a1a1a', frameColor: '#111',
        accentColor: '#b2b2b2',
        glassTint: 'rgba(25,25,35,0.85)',
        numberBoardBg: '#000', numberBoardText: '#fff',
        noseText: 'NS', noseTextColor: '#fff',
        handrailColor: '#999',
        headlightHousing: '#777', ditchLightColor: '#aaa',
        label: 'Norfolk Southern', number: '9552',
        logo: LOGO_BASE + 'ns.svg',
      },
      cn: {
        bodyColor: '#c8102e', frameColor: '#1a1a1a',
        accentColor: '#fff',
        glassTint: 'rgba(40,20,20,0.78)',
        numberBoardBg: '#111', numberBoardText: '#fff',
        noseText: 'CN', noseTextColor: '#fff',
        handrailColor: '#f0f0f0',
        headlightHousing: '#ccc', ditchLightColor: '#ddd',
        label: 'Canadian National', number: '2929',
        logo: LOGO_BASE + 'cn.svg',
      },
      amtrak: {
        bodyColor: '#1c3f6e', bodyColor2: '#e4e4e4',
        frameColor: '#222',
        accentColor: '#e31837', accent2Color: '#e4e4e4',
        glassTint: 'rgba(18,32,60,0.80)',
        numberBoardBg: '#0a1e3d', numberBoardText: '#fff',
        noseText: 'Amtrak', noseTextColor: '#fff',
        handrailColor: '#e4e4e4',
        headlightHousing: '#b0b0b0', ditchLightColor: '#ccc',
        label: 'Amtrak', number: '42',
        logo: LOGO_BASE + 'amtrak.svg',
      },
      mrl: {
        bodyColor: '#003ea4', frameColor: '#1a1a1a',
        accentColor: '#fff', accent2Color: '#d4001f',
        glassTint: 'rgba(15,30,65,0.82)',
        numberBoardBg: '#111', numberBoardText: '#fff',
        noseText: 'MRL', noseTextColor: '#fff',
        handrailColor: '#e8e8e8',
        headlightHousing: '#aaa', ditchLightColor: '#ccc',
        label: 'Montana Rail Link', number: '4301',
        logo: LOGO_BASE + 'mrl.png',
      },
      gn: {
        bodyColor: '#e86a10', bodyColor2: '#2d6e3f',
        frameColor: '#2d2d2d',
        accentColor: '#2d6e3f',
        glassTint: 'rgba(40,35,20,0.78)',
        numberBoardBg: '#1a1a1a', numberBoardText: '#fff',
        noseText: 'GN', noseTextColor: '#fff',
        handrailColor: '#f0f0f0',
        headlightHousing: '#ccc', ditchLightColor: '#ddd',
        label: 'Great Northern', number: '400',
        logo: LOGO_BASE + 'gn.svg',
      },
      bn: {
        bodyColor: '#006837', frameColor: '#1e1e1e',
        accentColor: '#000',
        glassTint: 'rgba(10,40,25,0.80)',
        numberBoardBg: '#111', numberBoardText: '#fff',
        noseText: 'BN', noseTextColor: '#fff',
        handrailColor: '#e5e5e5',
        headlightHousing: '#aaa', ditchLightColor: '#ccc',
        label: 'Burlington Northern', number: '6430',
        logo: LOGO_BASE + 'bn.svg',
      },
      santefe: {
        bodyColor: '#c8102e', bodyColor2: '#e4e4e4',
        frameColor: '#2a2a2a',
        accentColor: '#FFD100', accent2Color: '#000',
        glassTint: 'rgba(50,18,18,0.80)',
        numberBoardBg: '#111', numberBoardText: '#fff',
        noseText: 'Santa Fe', noseTextColor: '#FFD100',
        handrailColor: '#e8e8e8',
        headlightHousing: '#bbb', ditchLightColor: '#ddd',
        label: 'Santa Fe (Warbonnet)', number: '101',
        logo: LOGO_BASE + 'santefe.svg',
      },
    };

    function buildSVG(d) {
      const uid = Math.random().toString(36).slice(2, 8);
      const bodyGrad = `bg-${uid}`;
      const glassGrad = `gg-${uid}`;
      const hlGrad = `hl-${uid}`;
      const glowF = `gw-${uid}`;
      const refGrad = `rf-${uid}`;
      const shadowF = `sf-${uid}`;

      const bodyColor2Stop = d.bodyColor2
        ? `<stop offset="100%" stop-color="${d.bodyColor2}" />`
        : `<stop offset="100%" stop-color="${d.bodyColor}" />`;

      const noseFS = d.noseText.length > 4 ? 36 : 48;

      // Logo or fallback text
      const noseArt = d.logo
        ? `<image href="${d.logo}" x="120" y="180" width="160" height="100" preserveAspectRatio="xMidYMid meet" />`
        : `<text x="200" y="220" text-anchor="middle" dominant-baseline="central" fill="${d.noseTextColor}" font-size="${noseFS}" font-weight="900" font-family="'Impact','Arial Black',sans-serif" letter-spacing="3" paint-order="stroke" stroke="${d.accent2Color || 'rgba(0,0,0,0.15)'}" stroke-width="1">${d.noseText}</text>`;

      const numBoards = d.number ? `
        <rect x="112" y="62" width="66" height="22" rx="3" fill="${d.numberBoardBg}" stroke="#555" stroke-width="0.75"/>
        <text x="145" y="76" text-anchor="middle" dominant-baseline="central" fill="${d.numberBoardText}" font-size="15" font-weight="800" font-family="'Roboto Condensed','Arial Narrow',sans-serif" letter-spacing="1.5">${d.number}</text>
        <rect x="222" y="62" width="66" height="22" rx="3" fill="${d.numberBoardBg}" stroke="#555" stroke-width="0.75"/>
        <text x="255" y="76" text-anchor="middle" dominant-baseline="central" fill="${d.numberBoardText}" font-size="15" font-weight="800" font-family="'Roboto Condensed','Arial Narrow',sans-serif" letter-spacing="1.5">${d.number}</text>` : '';

      return `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="240" style="height:auto;display:block">
        <defs>
          <linearGradient id="${bodyGrad}" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="${d.bodyColor}" />
            <stop offset="55%" stop-color="${d.bodyColor}" />
            ${bodyColor2Stop}
          </linearGradient>
          <linearGradient id="${glassGrad}" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="rgba(160,195,220,0.45)" />
            <stop offset="40%" stop-color="${d.glassTint}" />
            <stop offset="100%" stop-color="rgba(20,25,35,0.92)" />
          </linearGradient>
          <radialGradient id="${hlGrad}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fffde8" />
            <stop offset="50%" stop-color="#ffe97a" />
            <stop offset="100%" stop-color="${d.headlightHousing}" />
          </radialGradient>
          <filter id="${glowF}" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <linearGradient id="${refGrad}" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
            <stop offset="30%" stop-color="rgba(255,255,255,0.08)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
          <filter id="${shadowF}" x="-8%" y="-4%" width="116%" height="112%">
            <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="rgba(0,0,0,0.4)"/>
          </filter>
        </defs>
        <g filter="url(#${shadowF})">
          <!-- Frame -->
          <rect x="55" y="310" width="290" height="100" rx="6" fill="${d.frameColor}"/>
          <rect x="165" y="370" width="70" height="42" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
          <rect x="180" y="385" width="40" height="18" rx="3" fill="#1a1a1a"/>
          <path d="M65,405 Q200,418 335,405 L342,414 Q200,432 58,414 Z" fill="${d.frameColor}" stroke="#333" stroke-width="1"/>
          <path d="M140,390 Q155,404 175,395" fill="none" stroke="#c4a832" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M260,390 Q245,404 225,395" fill="none" stroke="#c4a832" stroke-width="2.5" stroke-linecap="round"/>

          <!-- Cab nose -->
          <path d="M75,105 L75,310 L325,310 L325,105 L280,48 L120,48 Z" fill="url(#${bodyGrad})" stroke="#222" stroke-width="1.5"/>

          <!-- Windows -->
          <path d="M95,72 L118,50 L188,50 L188,128 L95,128 Z" fill="url(#${glassGrad})" stroke="#2a2a2a" stroke-width="3"/>
          <path d="M305,72 L282,50 L212,50 L212,128 L305,128 Z" fill="url(#${glassGrad})" stroke="#2a2a2a" stroke-width="3"/>
          <rect x="194" y="46" width="12" height="86" fill="${d.bodyColor}" stroke="#222" stroke-width="1"/>

          <!-- Number boards (large, centered in windows) -->
          ${numBoards}

          <!-- Glass reflections -->
          <path d="M101,78 L120,56 L155,56 L155,88 Z" fill="url(#${refGrad})" opacity="0.45"/>
          <path d="M299,78 L280,56 L255,56 L255,88 Z" fill="url(#${refGrad})" opacity="0.35"/>
          <line x1="145" y1="125" x2="120" y2="76" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="255" y1="125" x2="280" y2="76" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>

          <!-- Roof -->
          <path d="M120,48 L140,28 L260,28 L280,48 Z" fill="#3a3a3a" stroke="#222" stroke-width="1"/>
          <rect x="145" y="26" width="110" height="4" rx="2" fill="#4a4a4a"/>
          <rect x="175" y="14" width="8" height="16" rx="2" fill="#666" stroke="#444" stroke-width="1"/>
          <rect x="217" y="14" width="8" height="16" rx="2" fill="#666" stroke="#444" stroke-width="1"/>
          <rect x="172" y="10" width="14" height="6" rx="2" fill="#777"/>
          <rect x="214" y="10" width="14" height="6" rx="2" fill="#777"/>

          <!-- Headlights -->
          <rect x="187" y="138" width="26" height="36" rx="4" fill="${d.headlightHousing}" stroke="#444" stroke-width="1"/>
          <circle cx="200" cy="148" r="7" fill="url(#${hlGrad})" filter="url(#${glowF})"/>
          <circle cx="200" cy="166" r="6" fill="url(#${hlGrad})" filter="url(#${glowF})"/>
          <circle cx="100" cy="302" r="8" fill="${d.ditchLightColor}" stroke="#555" stroke-width="1.5"/>
          <circle cx="100" cy="302" r="4.5" fill="url(#${hlGrad})" filter="url(#${glowF})"/>
          <circle cx="300" cy="302" r="8" fill="${d.ditchLightColor}" stroke="#555" stroke-width="1.5"/>
          <circle cx="300" cy="302" r="4.5" fill="url(#${hlGrad})" filter="url(#${glowF})"/>
          <circle cx="200" cy="378" r="6" fill="#8a1111" stroke="#444" stroke-width="1" opacity="0.9"/>
          <circle cx="200" cy="378" r="3" fill="#ee2222" opacity="0.8"/>

          <!-- Logo / nose art -->
          ${noseArt}

          <!-- Handrails -->
          <path d="M75,140 Q67,140 67,150 L67,340 Q67,350 75,350" fill="none" stroke="${d.handrailColor}" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M325,140 Q333,140 333,150 L333,340 Q333,350 325,350" fill="none" stroke="${d.handrailColor}" stroke-width="3.5" stroke-linecap="round"/>
          <rect x="168" y="275" width="4" height="42" rx="1.5" fill="${d.handrailColor}"/>
          <rect x="180" y="270" width="4" height="47" rx="1.5" fill="${d.handrailColor}"/>
          <rect x="216" y="270" width="4" height="47" rx="1.5" fill="${d.handrailColor}"/>
          <rect x="228" y="275" width="4" height="42" rx="1.5" fill="${d.handrailColor}"/>
          <rect x="165" y="318" width="70" height="3" rx="1.5" fill="${d.handrailColor}"/>

          <!-- Panel lines -->
          <line x1="75" y1="178" x2="325" y2="178" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
          <line x1="75" y1="310" x2="325" y2="310" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
          <rect x="50" y="308" width="300" height="5" rx="1" fill="#333" stroke="#222" stroke-width="0.5"/>
        </g>
      </svg>`;
    }

    const gallery = document.getElementById('gallery');
    for (const [key, design] of Object.entries(DESIGNS)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        ${buildSVG(design)}
        <span class="label">${design.label}</span>
        <span class="sublabel">#${design.number}</span>
      `;
      gallery.appendChild(card);
    }
  </script>
</body>
</html>
