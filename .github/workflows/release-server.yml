# .github/workflows/release-server.yml
name: Release Server

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build server bundle
        run: cd apps/server && pnpm build:docker

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Write version file
        run: echo "${{ steps.version.outputs.version }}" > apps/server/dist/version.txt

      - name: Generate distribution package.json
        run: |
          cat > apps/server/dist/package.json <<'PKGJSON'
          {
            "name": "deja-server",
            "version": "${{ steps.version.outputs.version }}",
            "private": true,
            "type": "module",
            "engines": { "node": ">= 20" },
            "dependencies": {
              "serialport": "^12.0.0",
              "@serialport/parser-readline": "^12.0.0",
              "firebase-admin": "^13.4.0",
              "firebase": "^10.14.1",
              "ws": "^8.13.0",
              "mqtt": "^5.15.0",
              "signale": "^1.4.0",
              "dotenv": "^16.3.1",
              "play-sound": "^1.1.6",
              "wait-on": "^7.0.1",
              "@sentry/node": "^8.0.0",
              "vue": "^3.5.17",
              "vuefire": "^3.2.1",
              "@vueuse/core": "^11.0.3"
            }
          }
          PKGJSON

      - name: Create tarball
        run: |
          cd apps/server/dist
          tar -czf "${GITHUB_WORKSPACE}/deja-server.tar.gz" index.js package.json version.txt

      - name: Inject Firebase config into install script
        env:
          FB_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FB_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FB_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          cp scripts/install.sh "${GITHUB_WORKSPACE}/install.sh"
          sed -i \
            -e "s|__FIREBASE_API_KEY__|${FB_API_KEY}|g" \
            -e "s|__FIREBASE_AUTH_DOMAIN__|${FB_AUTH_DOMAIN}|g" \
            -e "s|__FIREBASE_PROJECT_ID__|${FB_PROJECT_ID}|g" \
            -e "s|__FIREBASE_DATABASE_URL__|${FB_DATABASE_URL}|g" \
            -e "s|__FIREBASE_STORAGE_BUCKET__|${FB_STORAGE_BUCKET}|g" \
            -e "s|__FIREBASE_MESSAGING_SENDER_ID__|${FB_MESSAGING_SENDER_ID}|g" \
            -e "s|__FIREBASE_APP_ID__|${FB_APP_ID}|g" \
            "${GITHUB_WORKSPACE}/install.sh"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            deja-server.tar.gz
            scripts/deja
            install.sh
