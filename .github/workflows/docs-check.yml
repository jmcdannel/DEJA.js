name: Docs Check

on:
  pull_request:
    branches: [main]

jobs:
  check-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for UI changes without doc updates
        id: check
        run: |
          # Detect UI-related file changes in this PR
          ui_changes=$(git diff --name-only origin/main...HEAD -- \
            'apps/throttle/src/**/*.vue' \
            'apps/throttle/src/**/*.ts' \
            'apps/cloud/src/**/*.vue' \
            'apps/cloud/src/**/*.ts' \
            'apps/monitor/src/**/*.vue' \
            'apps/monitor/src/**/*.ts' \
            'packages/ui/src/**/*.vue' \
            'packages/ui/src/**/*.ts' \
            | grep -v '\.test\.' \
            | grep -v '\.spec\.' \
            || true)

          if [ -z "$ui_changes" ]; then
            echo "ui_changed=false" >> "$GITHUB_OUTPUT"
            echo "No UI files changed — skipping docs check."
            exit 0
          fi

          echo "ui_changed=true" >> "$GITHUB_OUTPUT"
          echo "UI files changed:"
          echo "$ui_changes"

          # Check if docs or screenshots were also updated
          doc_updates=$(git diff --name-only origin/main...HEAD -- \
            'docs/**/*.mdx' \
            'apps/dejajs-www/public/screenshots/**' \
            || true)

          if [ -n "$doc_updates" ]; then
            echo "docs_updated=true" >> "$GITHUB_OUTPUT"
            echo "Doc/screenshot updates found:"
            echo "$doc_updates"
          else
            echo "docs_updated=false" >> "$GITHUB_OUTPUT"
          fi

          # Check for no-docs-needed label
          echo "Checking PR labels..."

      - name: Check for no-docs-needed label
        if: steps.check.outputs.ui_changed == 'true'
        id: label_check
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request?.labels || [];
            const hasLabel = labels.some(l => l.name === 'no-docs-needed');
            core.setOutput('has_label', hasLabel.toString());

      - name: Post reminder comment
        if: |
          steps.check.outputs.ui_changed == 'true' &&
          steps.check.outputs.docs_updated == 'false' &&
          steps.label_check.outputs.has_label != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Check if we already posted a reminder on this PR
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(c =>
              c.body.includes('<!-- docs-check-reminder -->')
            );

            if (botComment) {
              core.info('Reminder already posted — skipping.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `<!-- docs-check-reminder -->
            **Docs Reminder** — This PR changes UI files but no documentation or screenshots were updated.

            Consider running \`/update-docs\` in Claude Code to:
            - Capture fresh screenshots of affected views
            - Update MDX documentation pages

            To skip this check, add the \`no-docs-needed\` label to this PR.`
            });
