name: Changeset Check

on:
  pull_request:
    branches: [main]

jobs:
  check-changeset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changeset files
        id: check
        run: |
          # Look for new .changeset/*.md files added in this PR
          changesets=$(git diff --name-only --diff-filter=A origin/main...HEAD -- '.changeset/*.md' | grep -v -i 'readme.md' || true)
          if [ -z "$changesets" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$changesets" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if no changeset
        if: steps.check.outputs.found == 'false'
        run: |
          echo "::error::No changeset file found. Every PR must include a changeset entry."
          echo ""
          echo "To create one, run /changelog in Claude Code or manually create a .changeset/<name>.md file."
          echo ""
          echo "If this PR has NO user-facing changes (e.g., CI-only, docs-only), add a changeset with:"
          echo "  ---"
          echo "  \"deja\": patch"
          echo "  ---"
          echo "  changed: **[docs]** Description of what changed"
          exit 1

      - name: Report changeset found
        if: steps.check.outputs.found == 'true'
        run: |
          echo "Changeset file(s) found:"
          echo "${{ steps.check.outputs.files }}"
